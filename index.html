<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>未形 / primordia</title>
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-label="未形数字生命培养皿">
        <canvas id="dish" width="960" height="640"></canvas>
      </section>

      <aside class="panel" aria-label="培养皿控制台">
        <header>
          <p class="eyebrow">primordia</p>
          <h1>未形</h1>
          <p class="subtitle">在信息环境中寻找生命的开始</p>
        </header>

        <div class="controls" aria-label="仿真控制">
          <button id="toggle" type="button">暂停</button>
          <button id="step" type="button">单步</button>
          <button id="reset" type="button">重置</button>
        </div>

        <label class="slider">
          <span>速度 <output id="speed-label">16 tick/s</output></span>
          <input id="speed" type="range" min="0" max="8" value="6">
        </label>

        <dl class="metrics">
          <div><dt>tick</dt><dd id="m-tick">0</dd></div>
          <div><dt>seed</dt><dd id="m-seed">0</dd></div>
          <div><dt>生命</dt><dd id="m-agents">0</dd></div>
          <div><dt>活跃谱系</dt><dd id="m-lineages">0</dd></div>
          <div><dt>总谱系</dt><dd id="m-lineages-total">0</dd></div>
          <div><dt>灭绝谱系</dt><dd id="m-lineages-extinct">0</dd></div>
          <div><dt>优势谱系</dt><dd id="m-dominant-lineage">-</dd></div>
          <div><dt>优势占比</dt><dd id="m-dominant-share">0%</dd></div>
          <div><dt>总资源</dt><dd id="m-resource">0</dd></div>
          <div><dt>总痕迹</dt><dd id="m-trace">0</dd></div>
          <div><dt>总压力</dt><dd id="m-pressure">0</dd></div>
          <div><dt>平均能量</dt><dd id="m-energy">0</dd></div>
          <div><dt>最高世代</dt><dd id="m-generation">0</dd></div>
          <div><dt>出生</dt><dd id="m-births">0</dd></div>
          <div><dt>死亡</dt><dd id="m-deaths">0</dd></div>
          <div><dt>饥饿</dt><dd id="m-death-starvation">0</dd></div>
          <div><dt>压力</dt><dd id="m-death-pressure">0</dd></div>
          <div><dt>溢出</dt><dd id="m-death-overflow">0</dd></div>
        </dl>

        <div class="legend" aria-label="图例">
          <span><i class="resource"></i>资源</span>
          <span><i class="trace"></i>痕迹</span>
          <span><i class="agent"></i>生命</span>
        </div>
      </aside>
    </main>

    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
